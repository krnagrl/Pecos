<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registered Members | Pecos</title>
<link rel="icon" href="pecos.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<style>
:root{
  --primary:#2F6F95;
  --bg:#F4F6F8;
  --card:#FFFFFF;
  --text:#1F3E56;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Montserrat',sans-serif;
}

body{
  background:var(--bg);
  display:none;
  padding:30px;
}

header{
  font-size:22px;
  font-weight:700;
  margin-bottom:25px;
  color:var(--text);
}

.table-container{
  background:var(--card);
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:800px;
}

th{
  background:var(--text);
  color:#fff;
  padding:14px;
  text-align:left;
  font-size:14px;
}

td{
  padding:14px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

tr:hover{
  background:#f4f8fb;
}

.balance{
  font-weight:700;
  color:green;
}

.role-admin{
  color:#c0392b;
  font-weight:700;
}

@media(max-width:768px){
  body{
    padding:15px;
  }
}
</style>
</head>

<body>

<header>📋 Pecos Registered Members (Admin)</header>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Balance</th>
        <th>Role</th>
        <th>User ID</th>
      </tr>
    </thead>
    <tbody id="membersTable">
      <tr>
        <td colspan="6">Loading members...</td>
      </tr>
    </tbody>
  </table>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDnbqKwqvg9BoAjpgMBFCr3ZBOFOcuvZxs", authDomain: "pecos-432b5.firebaseapp.com", projectId: "pecos-432b5" };

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(async user=>{
  if(!user) return location.href="index.html";

  const snap = await db.collection("members").doc(user.uid).get();

  // Allow only admin
  if(!snap.exists || snap.data().role !== "admin"){
    return location.href="member.html";
  }

  document.body.style.display="block";
  loadMembers();
});

async function loadMembers(){
  const table = document.getElementById("membersTable");
  table.innerHTML = "";

  const snapshot = await db.collection("members").get();

  if(snapshot.empty){
    table.innerHTML = `
      <tr>
        <td colspan="6">No members found</td>
      </tr>
    `;
    return;
  }

  snapshot.forEach(doc=>{
    const data = doc.data();

    const row = `
      <tr>
        <td>${data.displayName || "-"}</td>
        <td>${data.email || "-"}</td>
        <td>${data.phone || "-"}</td>
        <td class="balance">₹ ${data.balance || 0}</td>
        <td class="${data.role === 'admin' ? 'role-admin' : ''}">
          ${data.role || "member"}
        </td>
        <td>${doc.id}</td>
      </tr>
    `;

    table.innerHTML += row;
  });
}
</script>

</body>
</html>
