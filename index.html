<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecos - Finance | Real Estate | Stocks & Shares</title>
<link rel="icon" href="pecos.png">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0d1b2a;
  --gold:#c6a15b;
  --light:#f4f6f9;
}

*{
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  margin:0;
  background:var(--light);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

.header{
  background:#fff;
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 15px rgba(0,0,0,0.05);
}

.header img{
  height:45px;
}

.main-wrapper{
  width:90%;
  max-width:1100px;
  margin:60px auto;
  display:grid;
  grid-template-columns:400px 1fr;
  gap:40px;
  flex:1;
}

.card{
  background:#fff;
  padding:35px;
  border-radius:8px;
  box-shadow:0 5px 25px rgba(0,0,0,0.06);
}

.card h3{
  margin-top:0;
  color:var(--primary);
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:4px;
}

button{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:4px;
  font-weight:600;
}

button:hover{
  background:#000;
}

#msg{
  color:red;
  font-size:13px;
}

.brand h1{
  font-size:48px;
  margin:0;
  color:var(--primary);
}

.brand h2{
  font-weight:400;
  color:#555;
}

.footer{
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:25px;
  font-size:13px;
}

@media(max-width:900px){
  .main-wrapper{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <img src="pecos.png">
</div>

<div class="main-wrapper">

  <div class="card">
    <h3>Member Login</h3>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
    <p style="cursor:pointer;color:blue;" onclick="resetPassword()">Forgot Password?</p>
  </div>

  <div class="card brand">
    <h1>PECOS</h1>
    <h2>Wealth. Strategy. Ownership.</h2>
    <p>
      Professional wealth advisory focused on disciplined investing,
      structured real estate strategy and long-term capital growth.
    </p>
  </div>

</div>

<div class="footer">
  © 2025 PECOS Wealth Advisory | Akola, Maharashtra
</div>

<script>

// 🔥 FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyDnbqKwqvg9BoAjpgMBFCr3ZBOFOcuvZxs",
      authDomain: "pecos-432b5.firebaseapp.com",
      projectId: "pecos-432b5",
      storageBucket: "pecos-432b5.appspot.com"
    };

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// Ensure persistence
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
.catch(error => console.error(error));

// 🔐 AUTH STATE LISTENER
auth.onAuthStateChanged(async (user) => {

  if (!user) return;

  if (!user.emailVerified) {
    document.getElementById("msg").innerText =
      "Please verify your email before login.";
    return;
  }

  try {

    const doc = await db.collection("members").doc(user.uid).get();

    if (!doc.exists) {
      document.getElementById("msg").innerText =
        "User record not found in database.";
      return;
    }

    const data = doc.data();

    if (data.role === "admin") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "member.html";
    }

  } catch (error) {
    console.error(error);
    document.getElementById("msg").innerText =
      "Access error: " + error.message;
  }

});

// 🔑 LOGIN FUNCTION
async function login(){

  const msg = document.getElementById("msg");
  msg.innerText = "";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    msg.innerText = "Please fill all fields";
    return;
  }

  try{
    await auth.signInWithEmailAndPassword(email, password);
  }
  catch(error){
    console.error(error);
    msg.innerText = error.message;
  }
}

// 🔁 RESET PASSWORD
function resetPassword(){

  const email = prompt("Enter registered email");

  if(!email) return;

  auth.sendPasswordResetEmail(email)
    .then(()=>alert("Password reset link sent"))
    .catch(err=>alert(err.message));
}

</script>

</body>
</html>
