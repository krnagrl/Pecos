<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecos - Finance | Real Estate | Stocks & Shares</title>
<link rel="icon" href="pecos.png">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:#111;
  --border:#fff;
  --text:#fff;
  --muted:#888;
}

*{
  box-sizing:border-box;
  font-family: "Courier New", monospace;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* HEADER */
.header{
  border-bottom:1px solid var(--border);
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header img{
  height:40px;
  filter:grayscale(100%) contrast(200%);
}

.nav a{
  color:#fff;
  text-decoration:none;
  margin-left:20px;
  font-size:14px;
}

.nav a:hover{
  text-decoration:underline;
}

/* MAIN WRAPPER */
.main-wrapper{
  width:85%;
  max-width:1200px;
  margin:60px auto;
  display:grid;
  grid-template-columns:350px 1fr;
  gap:40px;
  flex:1;
}

/* CARD */
.card{
  background:var(--card);
  padding:30px;
  border:1px solid var(--border);
}

/* LOGIN */
.card h3{
  margin-top:0;
  border-bottom:1px solid var(--border);
  padding-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  background:#000;
  border:1px solid #fff;
  color:#fff;
}

input:focus{
  outline:none;
  background:#111;
}

button{
  width:100%;
  padding:10px;
  background:#fff;
  color:#000;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#ccc;
}

.link{
  font-size:12px;
  color:#aaa;
  cursor:pointer;
}

.link:hover{
  text-decoration:underline;
}

#msg{
  font-size:12px;
  color:#ff4444;
}

/* MAIN BRAND */
.main-card{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.brand-content h1{
  font-size:60px;
  letter-spacing:6px;
  margin:0;
}

.brand-content h2{
  font-weight:normal;
  margin:20px 0;
  font-size:18px;
  color:#ccc;
}

.brand-content p{
  margin-top:30px;
  font-size:13px;
  letter-spacing:3px;
  color:#888;
}

.notice{
  border:1px solid #fff;
  padding:15px;
  margin-top:20px;
}

/* FOOTER */
.footer{
  border-top:1px solid var(--border);
  padding:30px;
  text-align:center;
  font-size:12px;
  color:#888;
}

/* RESPONSIVE */
@media(max-width:900px){
  .main-wrapper{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="header">
  <img src="pecos.png">
  <div class="nav">
    <a href="#">Home</a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-wrapper">

  <!-- LOGIN -->
  <div class="card">
    <h3>Member Login</h3>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
    <span class="link" onclick="resetPassword()">Forgot Password?</span>
  </div>

  <!-- BRAND SECTION -->
  <div class="card main-card">
    <div id="mainContent" class="brand-content">
      <h1>PECOS</h1>
      <h2>Wealth. Strategy. Ownership.</h2>
      <p>BUILDING ASSETS THAT OUTLAST TIME</p>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2025 PECOS
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDnbqKwqvg9BoAjpgMBFCr3ZBOFOcuvZxs",
  authDomain: "pecos-432b5.firebaseapp.com",
  projectId: "pecos-432b5"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

auth.onAuthStateChanged(async (user) => {
  if (user && user.emailVerified) {
    const doc = await db.collection("members").doc(user.uid).get();
    location.href = doc.data()?.isAdmin ? "admin.html" : "member.html";
  }
});

async function login(){
  const msg = document.getElementById("msg");
  msg.innerText = "";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    msg.innerText = "Please fill all fields";
    return;
  }

  try{
    const res = await auth.signInWithEmailAndPassword(email, password);
    if(!res.user.emailVerified){
      msg.innerText = "Please verify your email";
    }
  } catch(e){
    msg.innerText = e.message;
  }
}

function resetPassword(){
  const email = prompt("Enter registered email");
  if(!email) return;

  auth.sendPasswordResetEmail(email)
    .then(()=>alert("Password reset link sent"))
    .catch(err=>alert(err.message));
}

async function loadInvestment(e){
  e.preventDefault();
  const docName = e.target.getAttribute("data-doc");

  try{
    const doc = await db.collection("Content").doc(docName).get();

    document.getElementById("mainContent").innerHTML = `
      <div class="notice">
        <b>${docName}</b><br>
        ${doc.data()?.Data || "No data found"}
      </div>
    `;
  }catch{
    document.getElementById("mainContent").innerHTML = `
      <div class="notice">
        <b>Error</b><br>
        Unable to load data.
      </div>
    `;
  }
}
</script>

</body>
</html>
