<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecos Login</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f7fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:350px;
  background:#fff;
  padding:40px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  margin-top:0;
  text-align:center;
  color:#003366;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#003366;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#001f44;
}

#msg{
  font-size:13px;
  margin-bottom:10px;
  text-align:center;
  color:red;
}
</style>
</head>
<body>

<div class="container">
  <h2>Pecos Login</h2>
  <div id="msg"></div>
  <input id="email" type="email" placeholder="Enter Email">
  <input id="password" type="password" placeholder="Enter Password">
  <button id="loginBtn">Login</button>
</div>

<script>
/* Firebase Configuration */
const firebaseConfig = {
  apiKey: "AIzaSyDnbqKwqvg9BoAjpgMBFCr3ZBOFOcuvZxs",
  authDomain: "pecos-432b5.firebaseapp.com",
  projectId: "pecos-432b5"
};

/* Initialize Firebase */
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* Ensure persistence works */
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
.then(() => {
  console.log("Persistence enabled");
})
.catch((error) => {
  console.error("Persistence error:", error);
});

/* Auto Redirect if already logged in */
auth.onAuthStateChanged((user) => {
  if (user) {
    console.log("User detected:", user.email);
    window.location.href = "member.html";   // change if needed
  }
});

/* Login Button */
document.getElementById("loginBtn").addEventListener("click", function(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  msg.innerText = "";
  msg.style.color = "red";

  if (!email || !password){
    msg.innerText = "Please fill all fields";
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
  .then((userCredential) => {
      msg.style.color = "green";
      msg.innerText = "Login successful. Redirecting...";
      console.log("Logged in:", userCredential.user.email);
  })
  .catch((error) => {
      console.error("Login error:", error);
      msg.innerText = error.message;
  });

});
</script>

</body>
</html>
