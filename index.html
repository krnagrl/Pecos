<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecos - Finance | Real Estate | Stocks & Shares</title>
<link rel="icon" href="pecos.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<style>

:root{
  --primary:#2F6F95;
  --secondary:#3B7EA5;
  --accent:#2F6F95;
  --bg:#F4F6F8;
  --card:#FFFFFF;
  --text:#1F3E56;
  --muted:#5E6E7E;
}

*{
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  margin:0;
  background:var(--bg);
}

/* WRAPPER */
.wrapper{
  width:85%;
  max-width:1200px;
  margin:40px auto;
  background:var(--card);
  border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,.06);
  overflow:hidden;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:var(--primary);
  color:white;
}

.logo{
  font-weight:700;
  font-size:20px;
  letter-spacing:.5px;
}

.nav{
  display:flex;
  gap:30px;
}

.nav a{
  text-decoration:none;
  color:white;
  font-weight:500;
  font-size:14px;
  opacity:.95;
  transition:.2s;
}

.nav a:hover{
  opacity:1;
  text-decoration:underline;
}

/* MAIN */
.main{
  display:flex;
  align-items:flex-start;   /* FIXED */
  gap:40px;
  padding:50px;
  background:var(--bg);
}

/* CONTENT BOX */
.content-box{
  flex:2;
  background:var(--card);
  padding:35px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.content-box h3{
  margin-top:0;
  color:var(--text);
  font-size:22px;
  margin-bottom:15px;
}

.market-item{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #e2e8f0;
  font-size:15px;
}

.value{
  font-weight:600;
  transition:.3s;
}

.up{
  color:#16a34a;
  transform:translateY(-2px);
}

.down{
  color:#dc2626;
  transform:translateY(2px);
}

/* LOGIN BOX */
.login-box{
  flex:1;
  background:var(--card);
  padding:35px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,.05);
  max-width:340px;
  position:sticky;     /* ADDED stability */
  top:30px;
}

.login-box h3{
  margin-top:0;
  margin-bottom:20px;
  color:var(--text);
  font-size:18px;
}

input{
  width:100%;
  padding:12px 14px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #d6dee6;
  font-size:14px;
  transition:.2s;
}

input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(47,111,149,.15);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--secondary);
  color:white;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:var(--primary);
}

#msg{
  font-size:12px;
  color:red;
  margin-top:6px;
}

.link{
  font-size:12px;
  color:var(--primary);
  cursor:pointer;
}

.link:hover{
  text-decoration:underline;
}

/* FOOTER */
.footer{
  background:var(--text);
  color:#dbe6ef;
  padding:40px 50px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

.footer-left{
  max-width:60%;
  line-height:1.7;
}

.footer a{
  color:#7fc3ea;
  text-decoration:none;
}

.footer a:hover{
  text-decoration:underline;
}

.footer-right{
  align-self:flex-end;
  font-size:13px;
  opacity:.8;
}

/* RESPONSIVE */
@media(max-width:900px){
  .main{
    flex-direction:column;
    padding:30px;
  }

  .login-box{
    max-width:100%;
    position:static;
  }

  .wrapper{
    width:95%;
  }
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
  <div class="logo">PECOS</div>
  <div class="nav">
    <a href="index.html"><b>HOME</b></a>
    <a href="#">ABOUT</a>
    <a href="#">CONTACT</a>
  </div>
</div>

<div class="main">

  <!-- CONTENT BOX FIXED -->
<div class="content-box">
  <h3>Live Rate Overview</h3>

  <div class="market-item">
    <span>Interest Rate (%)</span>
    <span id="interest" class="value">15.00</span>
  </div>

  <div class="market-item">
    <span>Deposit Rate (%)</span>
    <span id="deposit" class="value">9.00</span>
  </div>

  <div class="market-item">
    <span>Coupon Rate</span>
    <span id="coupon" class="value">25000</span>
  </div>
    <div class="market-item">
    <span>Token Rate</span>
    <span id="fied" class="value">500</span>
  </div>
</div>

  <!-- LOGIN -->
  <div class="login-box">
    <h3>Member Login</h3>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
    <span class="link" onclick="resetPassword()">Forgot Password?</span>
  </div>

</div>

<div class="footer">
  <div class="footer-left">
    <b>Mobile:</b> (+91) 8669334862<br>
    <b>Email:</b> <a href="mailto:karan@pecos.in">karan@pecos.in</a><br>
    <b>Office:</b> 210 Yamuna Business Park, Akola MH 444001
  </div>

  <div class="footer-right">
    © 2025 PECOS. All rights reserved.
  </div>
</div>

</div>
<script>
const firebaseConfig={
  apiKey:"AIzaSyDnbqKwqvg9BoAjpgMBFCr3ZBOFOcuvZxs",
  authDomain:"pecos-432b5.firebaseapp.com",
  projectId:"pecos-432b5"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

auth.onAuthStateChanged(async(user)=>{
  if(user && user.emailVerified){
    const doc=await db.collection("members").doc(user.uid).get();
    location.href=doc.data()?.isAdmin ? "admin.html" : "member.html";
  }
});

async function login(){
  msg.innerText="";
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  if(!email || !password){
    msg.innerText="Please fill all fields";
    return;
  }

  try{
    const res=await auth.signInWithEmailAndPassword(email,password);
    if(!res.user.emailVerified)
      msg.innerText="Please verify your email";
  }catch(e){
    msg.innerText=e.message;
  }
}

function resetPassword(){
  const email=prompt("Enter registered email");
  if(!email) return;
  auth.sendPasswordResetEmail(email);
  alert("Password reset link sent");
}
  /* MARKET ANIMATION */

/* RATE FLUCTUATION */

function randomBetween(min, max, decimals = 0){
  let value = Math.random() * (max - min) + min;
  return decimals ? value.toFixed(decimals) : Math.round(value);
}

function updateRate(id, min, max, decimals = 0){
  const el = document.getElementById(id);
  const oldValue = parseFloat(el.innerText);
  const newValue = randomBetween(min, max, decimals);

  el.classList.remove("up","down");

  if(parseFloat(newValue) > oldValue){
    el.classList.add("up");
  } else {
    el.classList.add("down");
  }

  el.innerText = newValue;
}

/* Run once immediately */
updateRate("interest", 11, 18, 2);
updateRate("deposit", 7, 12, 2);
updateRate("coupon", 5000, 50000, 0);

/* Then update every 10 seconds */
setInterval(() => {
  updateRate("interest", 11, 18, 2);
  updateRate("deposit", 7, 12, 2);
  updateRate("coupon", 5000, 50000, 0);
}, 10000);
</script>
</body>
</html>
