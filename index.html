<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecos - Finance | Real Estate | Stocks & Shares</title>
<link rel="icon" href="pecos.png">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#003366;
  --accent:#e31837;
  --bg:#f5f7fa;
  --text:#222;
}

*{
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

.header{
  background:#fff;
  padding:16px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.header img{ height:45px; }

.nav a{
  text-decoration:none;
  color:var(--primary);
  margin-left:25px;
  font-weight:500;
}

.main-wrapper{
  width:85%;
  max-width:1200px;
  margin:60px auto;
  display:grid;
  grid-template-columns:380px 1fr;
  gap:50px;
  flex:1;
}

.card{
  background:#fff;
  padding:35px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card h3{
  margin-top:0;
  color:var(--primary);
  margin-bottom:25px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

#msg{
  font-size:13px;
  color:red;
  margin-bottom:10px;
}

.main-card{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:left;
  background:linear-gradient(135deg,#003366,#001f3f);
  color:#fff;
}

.brand-content h1{
  font-size:48px;
  margin:0;
}

.brand-content h2{
  font-weight:400;
  margin:20px 0;
}

.footer{
  background:#001f3f;
  color:#ccc;
  text-align:center;
  padding:30px;
  font-size:13px;
}

@media(max-width:900px){
  .main-wrapper{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="header">
  <img src="pecos.png">
  <div class="nav">
    <a href="#">Home</a>
  </div>
</div>

<div class="main-wrapper">

  <div class="card">
    <h3>Member Login</h3>
    <p id="msg"></p>
    <input id="email" type="email" placeholder="Enter your email">
    <input id="password" type="password" placeholder="Enter your password">
    <button onclick="login()">Login</button>
  </div>

  <div class="card main-card">
    <div class="brand-content">
      <h1>PECOS</h1>
      <h2>Wealth. Strategy. Ownership.</h2>
      <p>
        We help investors build long-term financial strength through disciplined investing.
      </p>
    </div>
  </div>

</div>

<div class="footer">
  © 2025 PECOS | All Rights Reserved
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDnbqKwqvg9BoAjpgMBFCr3ZBOFOcuvZxs",
  authDomain: "pecos-432b5.firebaseapp.com",
  projectId: "pecos-432b5"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* Keep user logged in */
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* Safe Redirect Logic */
auth.onAuthStateChanged(async (user) => {
  if (!user) return;

  try {
    const doc = await db.collection("members").doc(user.uid).get();

    if (doc.exists && doc.data().isAdmin === true) {
      window.location.href = "admin.html";
    } else {
      window.location.href = "member.html";
    }
  } catch (error) {
    console.error("Firestore error:", error);
    window.location.href = "member.html";
  }
});

/* Login Function */
async function login(){
  const msg = document.getElementById("msg");
  msg.innerText = "Logging in...";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    msg.innerText = "Please fill all fields";
    return;
  }

  try{
    await auth.signInWithEmailAndPassword(email, password);
    msg.innerText = "Success! Redirecting...";
  } catch(error){
    msg.innerText = error.message;
  }
}
</script>

</body>
</html>
