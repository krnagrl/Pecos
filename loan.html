<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecos Finance | Loan Application</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:'Montserrat',sans-serif;
  background:#f4f6f8;
  margin:0;
}
.container{
  max-width:900px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}
h2{
  margin-top:0;
  color:#003366;
}
input,select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #d6dee6;
  border-radius:10px;
}
button{
  background:#003366;
  color:#fff;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  width:100%;
}
button:hover{
  background:#002244;
}
.emi-box{
  background:#eef4f8;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}
.success{
  color:green;
  font-weight:600;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="container">
<h2>Loan Application Form</h2>

<form id="loanForm">

<h3>Personal Details</h3>
<input type="text" id="fullName" placeholder="Full Name" required>
<input type="text" id="pan" placeholder="PAN Number" required>
<input type="text" id="aadhaar" placeholder="Aadhaar Number" required>
<input type="number" id="income" placeholder="Monthly Income (₹)" required>

<h3>Loan Details</h3>
<input type="number" id="loanAmount" placeholder="Loan Amount (₹)" required>
<input type="number" id="interestRate" placeholder="Interest Rate (%)" value="14" required>
<input type="number" id="tenure" placeholder="Tenure (Months)" required>

<div class="emi-box">
<strong>Estimated EMI:</strong>
<p id="emiResult">₹ 0</p>
</div>

<h3>Bank Details</h3>
<input type="text" id="bankName" placeholder="Bank Name" required>
<input type="text" id="accountNumber" placeholder="Account Number" required>
<input type="text" id="ifscCode" placeholder="IFSC Code" required>

<button type="submit">Submit Application</button>
</form>

<p id="successMsg" class="success"></p>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDnbqKwqvg9BoAjpgMBFCr3ZBOFOcuvZxs",
  authDomain: "pecos-432b5.firebaseapp.com",
  projectId: "pecos-432b5",
  storageBucket: "pecos-432b5.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
  }
});

// EMI CALCULATOR
function calculateEMI(){
  const P = parseFloat(document.getElementById('loanAmount').value);
  const annualRate = parseFloat(document.getElementById('interestRate').value);
  const N = parseFloat(document.getElementById('tenure').value);

  if(!P || !annualRate || !N) return;

  const R = annualRate / 12 / 100;
  const EMI = (P * R * Math.pow(1+R,N)) / (Math.pow(1+R,N)-1);

  document.getElementById('emiResult').innerText =
    "₹ " + EMI.toFixed(2);
}

document.getElementById('loanAmount').addEventListener('input',calculateEMI);
document.getElementById('interestRate').addEventListener('input',calculateEMI);
document.getElementById('tenure').addEventListener('input',calculateEMI);

// SUBMIT
document.getElementById('loanForm').addEventListener('submit',async(e)=>{
  e.preventDefault();

  const user = auth.currentUser;
  if(!user) return;

  const data = {
    userId:user.uid,
    email:user.email,
    fullName:fullName.value,
    pan:pan.value,
    aadhaar:aadhaar.value,
    income:income.value,
    loanAmount:loanAmount.value,
    interestRate:interestRate.value,
    tenure:tenure.value,
    emi:emiResult.innerText,
    bankName:bankName.value,
    accountNumber:accountNumber.value,
    ifscCode:ifscCode.value,
    status:"Pending",
    createdAt:new Date()
  };

  await db.collection("financeRequests").add(data);

  document.getElementById('successMsg').innerText =
    "Application submitted successfully! Our team will contact you shortly.";

  loanForm.reset();
  document.getElementById('emiResult').innerText="₹ 0";
});
</script>

</body>
</html>
