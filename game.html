<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecos Game Arena</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:Montserrat,sans-serif;
  background:#f4f6f8;
  text-align:center;
  margin:0;
  display:none;
}

header{
  background:#1F3E56;
  color:white;
  padding:15px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

.balance{
  font-size:16px;
}

.container{
  padding:20px;
}

.bet-section button{
  padding:10px 18px;
  margin:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.india{background:blue;color:white;}
.pak{background:green;color:white;}
.draw{background:gray;color:white;}

input{
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:200px;
}

.dice-area{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:40px;
}

.dice{
  width:100px;
  height:100px;
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:20px;
  cursor:pointer;
  transition:transform .6s;
}

.blue{background:blue;color:white;}
.green{background:green;color:white;}

.rotate{
  transform:rotate(720deg);
}

#result{
  margin-top:20px;
  font-size:18px;
  font-weight:bold;
}

table{
  width:100%;
  margin-top:30px;
  border-collapse:collapse;
  font-size:14px;
}

th{
  background:#1F3E56;
  color:white;
  padding:8px;
}

td{
  padding:8px;
  border-bottom:1px solid #ddd;
}

.leaderboard{
  margin-top:40px;
}
</style>
</head>

<body>

<header>
  <div>Pecos Game Arena 🎮</div>
  <div class="balance">Balance: ₹<span id="wallet">0</span></div>
</header>

<div class="container">

<h2>India 🇮🇳 vs Pakistan 🇵🇰</h2>

<div class="bet-section">
  <button class="india" onclick="setBet('India')">India (2x)</button>
  <button class="pak" onclick="setBet('Pakistan')">Pakistan (2x)</button>
  <button class="draw" onclick="setBet('Draw')">Draw (3x)</button>
</div>

<input type="number" id="betAmount" placeholder="Enter Bet Amount" min="1">

<div class="dice-area">
  <div id="dice1" class="dice blue" onclick="rollDice()">1</div>
  <div id="dice2" class="dice green" onclick="rollDice()">1</div>
</div>

<div id="result"></div>

<h3>Your Game History</h3>
<div id="history"></div>

<div class="leaderboard">
<h3>🏆 Leaderboard (Top 10 Wins)</h3>
<div id="leaderboard"></div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDnbqKwqvg9BoAjpgMBFCr3ZBOFOcuvZxs",
  authDomain: "pecos-432b5.firebaseapp.com",
  projectId: "pecos-432b5",
  storageBucket: "pecos-432b5.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let selectedBet=null;
let currentBalance=0;

auth.onAuthStateChanged(async user=>{
  if(!user){
    window.location.href="index.html";
  }else{
    document.body.style.display="block";
    await loadWallet(user);
    loadHistory(user);
    loadLeaderboard();
  }
});

async function loadWallet(user){
  const ref=db.collection("members").doc(user.uid);
  const snap=await ref.get();

  if(!snap.exists){
    await ref.set({balance:1000});
    currentBalance=1000;
  }else{
    currentBalance=snap.data().balance || 0;
  }

  document.getElementById("wallet").innerText=currentBalance;
}

function setBet(team){
  selectedBet=team;
  alert("Selected: "+team);
}

function rollDice(){
  if(!selectedBet){
    alert("Select a team first!");
    return;
  }

  const bet=parseInt(document.getElementById("betAmount").value);
  if(!bet || bet<=0){
    alert("Enter valid bet amount!");
    return;
  }

  if(bet>currentBalance){
    alert("Insufficient balance!");
    return;
  }

  const d1=document.getElementById("dice1");
  const d2=document.getElementById("dice2");

  d1.classList.add("rotate");
  d2.classList.add("rotate");

  setTimeout(async()=>{
    d1.classList.remove("rotate");
    d2.classList.remove("rotate");

    const n1=Math.floor(Math.random()*6)+1;
    const n2=Math.floor(Math.random()*6)+1;

    d1.innerText=n1;
    d2.innerText=n2;

    let winner;
    if(n1>n2) winner="India";
    else if(n2>n1) winner="Pakistan";
    else winner="Draw";

    let multiplier = winner==="Draw" ? 3 : 2;
    let resultStatus;
    let winAmount=0;

    if(selectedBet===winner){
      winAmount=bet*multiplier;
      currentBalance+=winAmount;
      resultStatus="Win";
    }else{
      currentBalance-=bet;
      resultStatus="Loss";
    }

    document.getElementById("wallet").innerText=currentBalance;

    document.getElementById("result").innerText=
    `India: ${n1} | Pakistan: ${n2} → ${winner} wins. You ${resultStatus}!`;

    await updateBalance();
    await saveGame(n1,n2,winner,bet,resultStatus,winAmount);
    loadHistory(auth.currentUser);
    loadLeaderboard();

  },700);
}

async function updateBalance(){
  const user=auth.currentUser;
  await db.collection("members").doc(user.uid)
  .update({balance:currentBalance});
}

async function saveGame(n1,n2,winner,bet,status,winAmount){
  const user=auth.currentUser;
  await db.collection("gameResults").add({
    userId:user.uid,
    email:user.email,
    indiaScore:n1,
    pakistanScore:n2,
    winner:winner,
    bet:selectedBet,
    betAmount:bet,
    result:status,
    winAmount:winAmount,
    createdAt:new Date()
  });
}

async function loadHistory(user){
  const snap=await db.collection("gameResults")
  .where("userId","==",user.uid)
  .orderBy("createdAt","desc")
  .limit(10)
  .get();

  if(snap.empty){
    document.getElementById("history").innerHTML="No games played yet.";
    return;
  }

  let html="<table><tr><th>Bet</th><th>Amount</th><th>Result</th><th>Win ₹</th></tr>";

  snap.forEach(doc=>{
    const d=doc.data();
    html+=`<tr>
      <td>${d.bet}</td>
      <td>₹${d.betAmount}</td>
      <td>${d.result}</td>
      <td>₹${d.winAmount}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("history").innerHTML=html;
}

async function loadLeaderboard(){
  const snap=await db.collection("gameResults")
  .where("result","==","Win")
  .orderBy("winAmount","desc")
  .limit(10)
  .get();

  let html="<table><tr><th>User</th><th>Win ₹</th></tr>";

  snap.forEach(doc=>{
    const d=doc.data();
    html+=`<tr>
      <td>${d.email}</td>
      <td>₹${d.winAmount}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("leaderboard").innerHTML=html;
}
</script>

</body>
</html>
