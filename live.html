<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nifty 200 Live Prices</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    h1 { text-align: center; }
    table { border-collapse: collapse; width: 100%; background: white; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
    th { background: #222; color: white; }
    .green { color: green; }
    .red { color: red; }
  </style>
</head>
<body>

<h1>Nifty 200 Live Prices</h1>

<table id="stockTable">
  <thead>
    <tr>
      <th>Symbol</th>
      <th>Price</th>
      <th>Change</th>
      <th>% Change</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const stocks = [
  "RELIANCE", "TCS", "INFY", "HDFCBANK", "ICICIBANK", "SBIN", "ITC"
  // Add full Nifty 200 list here
];

async function fetchStock(symbol) {
  try {
    const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}.NS`);
    const data = await res.json();
    const quote = data.quoteResponse.result[0];

    return {
      symbol,
      price: quote.regularMarketPrice,
      change: quote.regularMarketChange,
      percent: quote.regularMarketChangePercent
    };
  } catch (e) {
    console.error(symbol, e);
    return null;
  }
}

async function loadData() {
  const tbody = document.querySelector("#stockTable tbody");
  tbody.innerHTML = "";

  for (let stock of stocks) {
    const data = await fetchStock(stock);
    if (!data) continue;

    const row = document.createElement("tr");

    const colorClass = data.change >= 0 ? "green" : "red";

    row.innerHTML = `
      <td>${data.symbol}</td>
      <td>${data.price}</td>
      <td class="${colorClass}">${data.change.toFixed(2)}</td>
      <td class="${colorClass}">${data.percent.toFixed(2)}%</td>
    `;

    tbody.appendChild(row);
  }
}

loadData();
setInterval(loadData, 10000); // refresh every 10 sec
</script>

</body>
</html>
