<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1F3E56">
<title>404 | Page Not Found | PECOS</title>
<link rel="icon" href="pecos.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#2F6F95;
  --bg:#F4F6F8;
  --card:#FFFFFF;
  --text:#1F3E56;
  --muted:#5E6E7E;
}

*{
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
}

.wrapper{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  background:var(--text);
  color:white;
}

.logo{
  font-weight:700;
  font-size:18px;
}

.nav a{
  text-decoration:none;
  color:white;
  font-size:14px;
  margin-left:20px;
  opacity:.9;
}

.nav a:hover{
  text-decoration:underline;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}

.card{
  background:var(--card);
  padding:60px 40px;
  border-radius:20px;
  box-shadow:0 12px 35px rgba(0,0,0,.06);
  text-align:center;
  max-width:600px;
  width:100%;
}

.card h1{
  font-size:72px;
  margin:0;
  color:var(--primary);
}

.card h2{
  margin:10px 0 20px 0;
  font-weight:600;
  color:var(--text);
}

.card p{
  color:var(--muted);
  line-height:1.7;
  margin-bottom:30px;
}

.btn{
  display:inline-block;
  background:var(--primary);
  color:white;
  padding:12px 28px;
  border-radius:8px;
  text-decoration:none;
  font-weight:500;
  transition:.2s ease;
}

.btn:hover{
  opacity:.9;
}

/* FOOTER */
.footer{
  background:var(--text);
  color:#dbe6ef;
  padding:25px;
  text-align:center;
  font-size:13px;
}

.footer a{
  color:#7fc3ea;
  text-decoration:none;
}

.footer a:hover{
  text-decoration:underline;
}

@media(max-width:600px){
  .card{
    padding:40px 20px;
  }
  .card h1{
    font-size:56px;
  }
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="header">
    <div class="logo">PECOS</div>

  </div>

  <div class="main">
    <div class="card">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>
        The page you are looking for may have been removed,
        renamed, or is temporarily unavailable.
      </p>
      <a href="index.html" class="btn">Return to Home</a>
    </div>
  </div>

  <div class="footer">
    © 2025 PECOS. All rights reserved.
  </div>

</div>

</body>
</html>
